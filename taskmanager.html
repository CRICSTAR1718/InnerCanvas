<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="taskmanagerstyles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <button class="back-home-btn" onclick="window.location.href='index.html'">
                    <span class="btn-icon">🏠</span>
                    Back to Home
                </button>
            </div>
            <h1>📝 Task Manager</h1>
            <p>Stay organized and productive</p>
        </header>
        
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Enter a new task..." maxlength="100">
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="totalTasks">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="completedTasks">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="pendingTasks">0</span>
                <span class="stat-label">Pending</span>
            </div>
        </div>
        
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        
        <div class="tasks-section">
            <ul id="taskList" class="task-list">
                <!-- Tasks will be dynamically added here -->
            </ul>
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📋</div>
                <h3>No tasks yet</h3>
                <p>Add your first task to get started!</p>
            </div>
        </div>
        
        <div class="actions">
            <button id="clearCompleted" class="clear-btn">Clear Completed</button>
            <button id="clearAll" class="clear-btn danger">Clear All</button>
        </div>
    </div>
    
    <script src="taskmanagerscript.js"></script>
</body>
</html>
